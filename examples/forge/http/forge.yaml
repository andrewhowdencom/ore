# Forge blueprint for an HTTP chat agent.
# Run with:
#   cd examples/forge/http
#   go run ../../../cmd/forge -config forge.yaml
# The output binary is written relative to the current working directory.
dist:
  name: http-chat
  output_path: ./http-chat
conduits:
  - name: http
    module: github.com/andrewhowdencom/ore/x/conduit/http
    options:
      addr: ":8080"  # TCP listen address
transforms:
  - name: systemprompt
    module: github.com/andrewhowdencom/ore/x/systemprompt
    options:
      content: "You are a helpful assistant."
  - name: guardrails
    module: github.com/andrewhowdencom/ore/x/guardrails
    options:
      rules:
        - "Always format code in markdown blocks."
