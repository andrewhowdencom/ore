<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Name}}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            min-height: 100vh;
        }
        #header {
            background: #2d2d2d;
            color: #fff;
            padding: 0.75rem 1rem;
            text-align: center;
            font-size: 1.125rem;
            font-weight: 500;
        }
        #container {
            max-width: 800px;
            margin: 0 auto;
            padding: 1.5rem 1rem;
        }
        .new-chat {
            display: inline-block;
            padding: 0.625rem 1.25rem;
            background: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 0.5rem;
            font-size: 0.9375rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
        }
        .new-chat:hover {
            background: #0056b3;
        }
        .thread-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .thread-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 0.5rem;
            padding: 1rem;
            text-decoration: none;
            color: inherit;
            display: block;
            transition: box-shadow 0.15s;
        }
        .thread-card:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .thread-id {
            font-size: 0.8125rem;
            color: #666;
            font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
            margin-bottom: 0.375rem;
        }
        .thread-preview {
            font-size: 0.9375rem;
            color: #333;
            line-height: 1.5;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .thread-meta {
            font-size: 0.8125rem;
            color: #888;
            margin-top: 0.5rem;
        }
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #888;
        }
        .empty-state p {
            margin-bottom: 1.5rem;
            font-size: 0.9375rem;
        }
    </style>
</head>
<body>
    <div id="header">{{.Name}}</div>
    <div id="container">
        <a href="/chat" class="new-chat">Start new chat</a>
        {{if .Threads}}
        <div class="thread-list">
            {{range .Threads}}
            <a href="/chat?thread={{.ID}}" class="thread-card">
                <div class="thread-id">{{.ID}}</div>
                <div class="thread-preview">{{.Preview}}</div>
                <div class="thread-meta">Updated {{.UpdatedAt.Format "Jan 2, 2006 3:04 PM"}}</div>
            </a>
            {{end}}
        </div>
        {{else}}
        <div class="empty-state">
            <p>No conversations yet.</p>
            <a href="/chat" class="new-chat">Start new chat</a>
        </div>
        {{end}}
    </div>
</body>
</html>
