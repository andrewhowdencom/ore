<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Name}}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            min-height: 100vh;
        }
        #header {
            background: #2d2d2d;
            color: #fff;
            padding: 0.75rem 1rem;
            text-align: center;
            font-size: 1.125rem;
            font-weight: 500;
        }
        #container {
            max-width: 800px;
            margin: 0 auto;
            padding: 1.5rem 1rem;
        }
        .new-chat {
            display: inline-block;
            padding: 0.625rem 1.25rem;
            background: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 0.5rem;
            font-size: 0.9375rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
        }
        .new-chat:hover {
            background: #0056b3;
        }
        .thread-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .thread-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 0.5rem;
            padding: 1rem;
            text-decoration: none;
            color: inherit;
            display: block;
            transition: box-shadow 0.15s;
        }
        .thread-card:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .thread-id {
            font-size: 0.8125rem;
            color: #666;
            font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
            margin-bottom: 0.375rem;
        }
        .thread-preview {
            font-size: 0.9375rem;
            color: #333;
            line-height: 1.5;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .thread-meta {
            font-size: 0.8125rem;
            color: #888;
            margin-top: 0.5rem;
        }
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #888;
        }
        .empty-state p {
            margin-bottom: 1.5rem;
            font-size: 0.9375rem;
        }
        .load-more {
            display: block;
            margin: 1.5rem auto 0;
            padding: 0.625rem 1.5rem;
            background: #fff;
            color: #007bff;
            border: 1px solid #007bff;
            border-radius: 0.5rem;
            font-size: 0.9375rem;
            font-weight: 500;
            cursor: pointer;
        }
        .load-more:hover {
            background: #007bff;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="header">{{.Name}}</div>
    <div id="container">
        <a href="/chat" class="new-chat">Start new chat</a>
        {{if .Threads}}
        <div class="thread-list">
            {{range .Threads}}
            <a href="/chat?thread={{.ID}}" class="thread-card">
                <div class="thread-id">{{.ID}}</div>
                {{if .Preview}}
                <div class="thread-preview">{{.Preview}}</div>
                {{end}}
                <div class="thread-meta">Updated {{.LastAt.Format "Jan 2, 2006 3:04 PM"}}</div>
            </a>
            {{end}}
        </div>
        {{if .NextCursor}}
        <button id="load-more" data-cursor="{{.NextCursor}}" class="load-more">Load more</button>
        {{end}}
        {{else}}
        <div class="empty-state">
            <p>No conversations yet.</p>
            <a href="/chat" class="new-chat">Start new chat</a>
        </div>
        {{end}}
    </div>
    <noscript><style>#load-more { display: none; }</style></noscript>
    <script>
    (function() {
        var button = document.getElementById('load-more');
        if (!button) { return; }
        var list = document.querySelector('.thread-list');
        if (!list) { return; }

        function esc(s) {
            var d = document.createElement('div');
            d.textContent = s == null ? '' : String(s);
            return d.innerHTML;
        }

        function formatDate(iso) {
            var d = new Date(iso);
            if (isNaN(d.getTime())) { return ''; }
            var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            var month = months[d.getMonth()];
            var day = d.getDate();
            var year = d.getFullYear();
            var hour = d.getHours();
            var min = d.getMinutes();
            var ampm = hour >= 12 ? 'PM' : 'AM';
            hour = hour % 12;
            if (hour === 0) { hour = 12; }
            var minStr = min < 10 ? '0' + min : '' + min;
            return month + ' ' + day + ', ' + year + ' ' + hour + ':' + minStr + ' ' + ampm;
        }

        function renderCard(t) {
            var preview = t.preview
                ? '<div class="thread-preview">' + esc(t.preview) + '</div>'
                : '';
            return '<a href="/chat?thread=' + esc(t.id) + '" class="thread-card">' +
                '<div class="thread-id">' + esc(t.id) + '</div>' +
                preview +
                '<div class="thread-meta">Updated ' + esc(formatDate(t.last_at)) + '</div>' +
                '</a>';
        }

        button.addEventListener('click', function() {
            var cursor = button.getAttribute('data-cursor');
            if (!cursor) { return; }
            fetch('/threads?cursor=' + encodeURIComponent(cursor) + '&limit=20', {
                headers: { 'Accept': 'application/json' }
            })
            .then(function(r) {
                if (!r.ok) { throw new Error('Failed to load more (' + r.status + ')'); }
                return r.json();
            })
            .then(function(data) {
                var threads = data.threads || [];
                var html = '';
                for (var i = 0; i < threads.length; i++) {
                    html += renderCard(threads[i]);
                }
                list.insertAdjacentHTML('beforeend', html);
                if (data.next_cursor) {
                    button.setAttribute('data-cursor', data.next_cursor);
                } else {
                    button.parentNode.removeChild(button);
                }
            })
            .catch(function(err) {
                console.error('Load more failed:', err);
            });
        });
    })();
    </script>
</body>
</html>
