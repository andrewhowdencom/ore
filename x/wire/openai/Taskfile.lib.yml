# Taskfile.lib.yml — shared task definitions used by the root Taskfile and by every
# workspace module under x/ and examples/. The validate task aggregates lint,
# test, and build steps defined here and is reused via includes in Taskfile.yml.
version: '3'

tasks:
  build:
    desc: Compile the application and all packages
    cmds:
      - go build ./...

  test:
    desc: Run unit tests with race detection
    cmds:
      - go test -race ./...

  lint:
    desc: Run code linters
    cmds:
      - go vet ./...
      - golangci-lint run ./...

  validate:
    desc: Run lints, tests, and build
    deps: [lint, test, build]
